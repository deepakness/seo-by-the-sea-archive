<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body class="{% if page.archived_post %}is-post{% endif %}">
    <a class="skip-link" href="#content">Skip to content</a>
    <header class="site-header">
      <a class="site-mark" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
        <span class="site-mark__title">SEO by the Sea</span>
        <span class="site-mark__note">Preservation Archive</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ '/start-here/' | relative_url }}">Start Here</a>
        <a href="{{ '/archive/' | relative_url }}">Archive</a>
        <a href="{{ '/search/' | relative_url }}">Search</a>
        <a href="https://github.com/deepakness/seo-by-the-sea-archive">GitHub</a>
      </nav>
    </header>

    <main id="content" class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>
        Archived for preservation. Bill Slawski's writing and media remain the
        work of Bill Slawski and/or the appropriate rightsholders.
      </p>
      <p>
        <a href="{{ '/notice/' | relative_url }}">Notice</a>
        <span aria-hidden="true">/</span>
        <a href="{{ '/takedown/' | relative_url }}">Takedown requests</a>
        <span aria-hidden="true">/</span>
        <a href="https://www.seobythesea.com/">Original site</a>
        <span aria-hidden="true">/</span>
        <a href="https://github.com/deepakness/seo-by-the-sea-archive">GitHub repository</a>
      </p>
    </footer>

    <script>
      window.SEOBTS_BASEURL = {{ site.baseurl | jsonify }};
    </script>
    <script src="{{ '/assets/site.js' | relative_url }}" defer></script>
  </body>
</html>
